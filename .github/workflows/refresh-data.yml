name: Refresh leaderboard data

# Substack's API is not reachable from the Claude Code sandbox, so the live
# fetch runs here (GitHub-hosted runners have outbound network access).
on:
  workflow_dispatch: {}
  schedule:
    # Every day at 13:00 UTC
    - cron: "0 13 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch live leaderboard data
        run: node scripts/fetch-leaderboard.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore: refresh Substack leaderboard data"
            git push
          else
            echo "No changes to leaderboard data."
          fi
